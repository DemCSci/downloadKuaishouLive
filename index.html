<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jiuyi</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>jiuyi</h1>
        <p class="sub-title">
          选择录制来源并输入链接，点击开始即可保存到本地视频目录（默认 MKV）。
        </p>

        <div class="tab-switch" role="tablist" aria-label="录制来源">
          <button
            id="tabGenericBtn"
            class="tab-btn active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="panelGeneric"
          >
            通用直播流
          </button>
          <button
            id="tabDouyinBtn"
            class="tab-btn"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="panelDouyin"
          >
            抖音直播
          </button>
        </div>

        <div id="panelGeneric" class="tab-panel active" role="tabpanel" aria-labelledby="tabGenericBtn">
          <label for="streamUrl" class="input-label">直播流链接</label>
          <div class="input-wrap">
            <input
              id="streamUrl"
              type="url"
              spellcheck="false"
              placeholder="例如：https://hw-origin.pull.yximgs.com/xxx.flv?..."
            />
          </div>
        </div>

        <div
          id="panelDouyin"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tabDouyinBtn"
          hidden
        >
          <label for="douyinPageUrl" class="input-label">抖音直播页链接</label>
          <div class="input-wrap">
            <input
              id="douyinPageUrl"
              type="url"
              spellcheck="false"
              placeholder="例如：https://live.douyin.com/43464444647"
            />
          </div>
          <p class="tab-hint">
            输入 <code>live.douyin.com</code> 页面地址，程序会自动解析真实拉流地址后再启动录制。
          </p>
        </div>

        <div class="dir-row">
          <span id="outputDir" class="output-dir">保存目录: 加载中...</span>
          <button id="chooseDirBtn" class="btn ghost">选择保存目录</button>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary">开始录制</button>
          <button id="stopBtn" class="btn danger" disabled>停止录制</button>
          <button id="openBtn" class="btn ghost" disabled>打开文件位置</button>
        </div>

        <div class="metrics-row">
          <span id="fileSize">文件大小: 0 B</span>
          <span id="diskFree">磁盘剩余: --</span>
        </div>

        <div class="status-row">
          <span class="status-tag" id="statusTag">空闲中</span>
          <span id="statusText">等待开始录制</span>
        </div>

        <p id="outputPath" class="output-path"></p>

        <div class="log-wrap">
          <div class="log-title">运行日志</div>
          <pre id="logs"></pre>
        </div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
