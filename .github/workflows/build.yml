name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win:all
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-win
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-linux-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:linux:cli
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-linux-cli
          path: dist/jiuyi-cli-linux-x64
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
      - build-linux-cli
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: ls -R release-assets
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/jiuyi-mac/*
            release-assets/jiuyi-win/*
            release-assets/jiuyi-linux-cli/*
