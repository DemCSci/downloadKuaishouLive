name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      FFMPEG_PACKAGE_URL: "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-7.1.1-full_build-shared.7z"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prepare Default FFmpeg (Windows x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archivePath = Join-Path $env:RUNNER_TEMP "ffmpeg-7.1.1-full_build-shared.7z"
          $extractDir = Join-Path $env:RUNNER_TEMP "ffmpeg-7.1.1-full_build-shared"
          $targetDir = Join-Path $env:GITHUB_WORKSPACE "ffmpeg-custom\\win32-x64"
          $targetFile = Join-Path $targetDir "ffmpeg.exe"

          Write-Host "Downloading FFmpeg package from $env:FFMPEG_PACKAGE_URL"
          Invoke-WebRequest -Uri $env:FFMPEG_PACKAGE_URL -OutFile $archivePath

          Write-Host "Extracting package to $extractDir"
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          7z x $archivePath "-o$extractDir" -y | Out-Null

          $expectedFfmpeg = Join-Path $extractDir "ffmpeg-7.1.1-full_build-shared\\bin\\ffmpeg.exe"
          if (Test-Path $expectedFfmpeg) {
            $ffmpegExe = Get-Item $expectedFfmpeg
          } else {
            $ffmpegExe = Get-ChildItem -Path $extractDir -Recurse -Filter ffmpeg.exe `
              | Where-Object { $_.FullName -match "\\\\bin\\\\ffmpeg\\.exe$" } `
              | Select-Object -First 1
          }

          if (-not $ffmpegExe) {
            throw "ffmpeg.exe not found in extracted package."
          }

          Write-Host "Resolved ffmpeg source: $($ffmpegExe.FullName)"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $sourceBinDir = Split-Path -Parent $ffmpegExe.FullName
          Copy-Item -Path (Join-Path $sourceBinDir "ffmpeg.exe") -Destination $targetFile -Force
          Get-ChildItem -Path $sourceBinDir -Filter "*.dll" | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $targetDir $_.Name) -Force
          }
          Write-Host "Prepared default ffmpeg: $targetFile"
          if (-not (Test-Path $targetFile)) {
            throw "Copied ffmpeg.exe not found at target path."
          }
          $dllCount = (Get-ChildItem -Path $targetDir -Filter "*.dll").Count
          Write-Host "Bundled ffmpeg dll count: $dllCount"
          $ffVersionLine = & $targetFile -version | Select-Object -First 1
          Write-Host "Bundled ffmpeg version: $ffVersionLine"

      - run: npm run dist:win:all
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-win
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-linux-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:linux:cli
      - uses: actions/upload-artifact@v4
        with:
          name: jiuyi-linux-cli
          path: dist/jiuyi-cli-linux-x64
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
      - build-linux-cli
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: ls -R release-assets
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/jiuyi-mac/*
            release-assets/jiuyi-win/*
            release-assets/jiuyi-linux-cli/*
